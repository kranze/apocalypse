<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welt-Übersicht – Wasteland Debug v6</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <!-- MarkerCluster CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    crossorigin=""
  />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }
    #toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 8px 14px; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0;
    }
    #toolbar h1 { font-size: 1rem; white-space: nowrap; }
    #status { font-size: 0.85rem; color: #aaa; }
    .sim-btn {
      padding: 4px 10px; background: #2a6; border: none; color: #fff;
      border-radius: 4px; cursor: pointer; font-size: 0.82rem;
    }
    .sim-btn:hover:not(:disabled) { background: #1a5; }
    .sim-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-reset {
      padding: 4px 10px; background: #e55; border: none; color: #fff;
      border-radius: 4px; cursor: pointer; font-size: 0.82rem;
    }
    #btn-reset:hover:not(:disabled) { background: #c33; }
    #btn-reset:disabled { opacity: 0.45; cursor: not-allowed; }
    #back-link { font-size: 0.8rem; color: #888; text-decoration: none; margin-left: auto; }
    #back-link:hover { color: #ccc; }
    #map { flex: 1; }
    #empty-notice {
      position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(30,30,30,0.95); border: 1px solid #555;
      padding: 20px 28px; border-radius: 8px; text-align: center; max-width: 360px;
    }
    #empty-notice p { margin-bottom: 12px; line-height: 1.5; }
    #btn-spawn-notice {
      padding: 8px 20px; background: #e55; border: none; color: #fff;
      border-radius: 4px; cursor: pointer; font-size: 1rem;
    }
    #btn-spawn-notice:hover { background: #c33; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>🌍 Welt-Übersicht (Debug)</h1>
  <span id="status">Lade…</span>
  <button class="sim-btn" id="btn-day1" title="1 Tag simulieren">+1 Tag</button>
  <button class="sim-btn" id="btn-day10" title="10 Tage simulieren">+10 Tage</button>
  <button class="sim-btn" id="btn-day30" title="30 Tage simulieren">+30 Tage</button>
  <button id="btn-reset" title="Survivors neu spawnen (Tag 0)">Reset (neu spawnen)</button>
  <a href="/" id="back-link">← Spiel</a>
</div>

<div id="map"></div>

<div id="empty-notice" class="hidden">
  <p>Die Tabelle <code>survivors</code> ist leer.<br>Lass 100.000 Überlebende spawnen?</p>
  <button id="btn-spawn-notice">100.000 spawnen</button>
</div>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>
<!-- Leaflet.heat -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js" crossorigin=""></script>
<!-- Leaflet.markercluster -->
<script
  src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
  crossorigin=""
></script>

<script>
(function () {
  'use strict';

  // --- Map setup ---
  const map = L.map('map', { worldCopyJump: true }).setView([20, 10], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  // --- Layer holders ---
  let heatLayer = null;
  let clusterLayer = null;
  let currentPoints = [];  // [[lat, lon, size, id, isGroup], ...] – Entitäten (Einzelperson: size=1, isGroup=0; Gruppe: size>=2, isGroup=1)

  const ZOOM_THRESHOLD = 5;

  const statusEl = document.getElementById('status');
  const simBtns = document.querySelectorAll('.sim-btn, #btn-reset');

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function setBusy(busy, label) {
    simBtns.forEach(b => b.disabled = busy);
    if (busy && label) setStatus(label);
  }

  // Build heatmap layer from points [[lat, lon, size, ...], ...]; size = heat weight
  function buildHeatLayer(points) {
    const maxSize = points.reduce((m, p) => Math.max(m, p[2]), 1);
    const heatPts = points.map(p => [p[0], p[1], p[2]]);
    return L.heatLayer(heatPts, {
      radius: 10,
      blur: 8,
      max: maxSize,
      maxZoom: ZOOM_THRESHOLD,
      gradient: { 0.2: '#00f', 0.5: '#0ff', 0.7: '#0f0', 0.85: '#ff0', 1.0: '#f00' },
    });
  }

  // Füllt ein Popup asynchron mit echten Details vom Backend
  async function fillPopup(marker, entityId, isGroup) {
    const url = isGroup ? `/survivor-group/${entityId}` : `/survivor/${entityId}`;
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const d = await resp.json();

      let html;
      if (!isGroup) {
        // Einzelperson
        const sexLabel = d.sex === 'm' ? 'm' : d.sex === 'f' ? 'f' : 'x';
        html = `<strong>${d.name}</strong><br>${d.age} J., ${sexLabel}, ${d.profession}<br><em>${d.region}</em>`;
      } else {
        // Gruppe
        const c = d.composition;
        const s = d.sex_split;
        const sampleLines = d.sample_members
          .map(m => `• ${m.name}, ${m.age} J., ${m.profession}`)
          .join('<br>');
        const medLine = d.has_medical ? '<br>🩺 <em>medizinisch dabei</em>' : '';
        html =
          `<strong>Gruppe · ${d.size.toLocaleString('de-DE')} Mitglieder</strong><br>` +
          `Kinder ${c.children} · Erwachsene ${c.adults} · Senioren ${c.seniors} · ` +
          `(${s.m}m / ${s.f}f)<br>` +
          sampleLines + medLine;
      }
      marker.setPopupContent(html);
    } catch (err) {
      marker.setPopupContent('Fehler beim Laden: ' + err.message);
    }
  }

  // Build marker cluster layer ONLY for points within the current viewport
  function buildClusterForViewport() {
    if (!currentPoints.length) return null;
    const bounds = map.getBounds();
    const visible = currentPoints.filter(p => bounds.contains([p[0], p[1]]));
    if (!visible.length) return null;

    const cluster = L.markerClusterGroup({ chunkedLoading: true, chunkInterval: 100 });
    const markers = visible.map(p => {
      // p = [lat, lon, size, id, isGroup]
      const [lat, lon, size, entityId, isGroup] = p;
      const marker = L.marker([lat, lon]);
      // Popup zunächst mit Platzhalter; bei Öffnen Details laden
      marker.bindPopup('Lade…');
      marker.on('popupopen', () => {
        fillPopup(marker, entityId, isGroup === 1);
      });
      return marker;
    });
    cluster.addLayers(markers);
    return cluster;
  }

  // Rebuild cluster layer (lazy + viewport-bounded); remove old one first
  function rebuildCluster() {
    if (clusterLayer) {
      if (map.hasLayer(clusterLayer)) map.removeLayer(clusterLayer);
      clusterLayer = null;
    }
    clusterLayer = buildClusterForViewport();
    if (clusterLayer) clusterLayer.addTo(map);
  }

  // Switch layers based on current zoom; rebuild cluster when zooming in
  function updateLayers() {
    if (!currentPoints.length) return;
    const zoom = map.getZoom();

    if (zoom < ZOOM_THRESHOLD) {
      // Below threshold: only heatmap
      if (clusterLayer && map.hasLayer(clusterLayer)) map.removeLayer(clusterLayer);
      if (clusterLayer) { clusterLayer = null; }
      if (heatLayer && !map.hasLayer(heatLayer)) heatLayer.addTo(map);
    } else {
      // Above threshold: cluster (viewport-only) + no heatmap
      if (heatLayer && map.hasLayer(heatLayer)) map.removeLayer(heatLayer);
      rebuildCluster();
    }
  }

  // On move/zoom: if already at cluster zoom, rebuild cluster for new viewport
  function onMapMove() {
    if (!currentPoints.length) return;
    const zoom = map.getZoom();
    if (zoom >= ZOOM_THRESHOLD) {
      rebuildCluster();
    }
  }

  map.on('zoomend', updateLayers);
  map.on('moveend', onMapMove);

  // Render data: tear down old layers, build fresh heatmap; cluster only if already zoomed in
  function renderPoints(points) {
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    if (clusterLayer) { map.removeLayer(clusterLayer); clusterLayer = null; }

    currentPoints = points;
    if (!points.length) return;

    // Always rebuild heatmap (fast for 100k points)
    heatLayer = buildHeatLayer(points);

    // Cluster: lazy – only if currently zoomed in, otherwise built on next zoom/move
    const zoom = map.getZoom();
    if (zoom >= ZOOM_THRESHOLD) {
      rebuildCluster();
    } else {
      heatLayer.addTo(map);
    }
  }

  // Update status bar from stats object
  function applyStats(stats) {
    setStatus(
      `Tag ${stats.day} · ${stats.alive.toLocaleString('de-DE')} lebende · ${stats.groups.toLocaleString('de-DE')} Gruppen`
    );
  }

  // Load stats and update status bar
  async function loadStats() {
    const resp = await fetch('/survivors/stats');
    if (!resp.ok) throw new Error(`/survivors/stats HTTP ${resp.status}`);
    return resp.json();
  }

  // Load survivors as entities (alive only) and redraw layers
  async function loadAndRender() {
    const resp = await fetch('/survivors');
    if (!resp.ok) throw new Error(`/survivors HTTP ${resp.status}`);
    const data = await resp.json();

    document.getElementById('empty-notice').classList.toggle('hidden', data.count > 0);
    renderPoints(data.count > 0 ? data.points : []);
    return data;
  }

  // Full refresh: survivors + stats
  async function refresh() {
    const [data, stats] = await Promise.all([loadAndRender(), loadStats()]);
    if (data.count === 0) {
      setStatus('Keine Überlebenden in der DB');
    } else {
      applyStats(stats);
    }
  }

  // Simulate N days
  async function simulateDays(n) {
    setBusy(true, `Simuliere ${n} Tag${n === 1 ? '' : 'e'}…`);
    try {
      const resp = await fetch('/debug/simulate-days', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ days: n }),
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const stats = await resp.json();
      await loadAndRender();
      applyStats(stats);
    } catch (err) {
      setStatus('Fehler: ' + err.message);
      console.error(err);
    } finally {
      setBusy(false);
    }
  }

  // Spawn survivors via debug endpoint (Reset)
  async function spawnSurvivors() {
    setBusy(true, 'Spawne 100.000 Überlebende…');
    document.getElementById('empty-notice').classList.add('hidden');
    try {
      const resp = await fetch('/debug/spawn-survivors', { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      await refresh();
    } catch (err) {
      setStatus('Fehler beim Spawnen: ' + err.message);
      console.error(err);
    } finally {
      setBusy(false);
    }
  }

  // Wire up buttons
  document.getElementById('btn-day1').addEventListener('click', () => simulateDays(1));
  document.getElementById('btn-day10').addEventListener('click', () => simulateDays(10));
  document.getElementById('btn-day30').addEventListener('click', () => simulateDays(30));
  document.getElementById('btn-reset').addEventListener('click', spawnSurvivors);
  document.getElementById('btn-spawn-notice').addEventListener('click', spawnSurvivors);

  // Initial load
  setStatus('Lade…');
  refresh().catch(err => { setStatus('Fehler: ' + err.message); console.error(err); });
})();
</script>
</body>
</html>
